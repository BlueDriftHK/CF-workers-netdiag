<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NetSight Pro | 极光网络诊断工具 - 部署在Cloudflare Workers的专业级网络诊断工具</title>
    <meta name="description" content="NetSight Pro是一个部署在Cloudflare Workers边缘节点的专业级网络诊断工具，提供实时RTT监控、带宽测速、安全协议检测等多维度网络测试功能。">
    <meta name="keywords" content="网络诊断,RTT监控,带宽测速,Cloudflare Workers,TLS检测,WebSocket测试">
    <meta name="author" content="BlueDriftHK">
    <meta property="og:title" content="NetSight Pro | 极光网络诊断工具">
    <meta property="og:description" content="部署在Cloudflare Workers边缘节点的专业级网络诊断工具">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... 保持原有样式 ... */
        
        /* 新增：主题切换按钮 */
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .theme-toggle:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(15deg);
        }
        
        /* 亮色主题变量 */
        body.light {
            background: radial-gradient(ellipse at 20% 30%, #e8eef5, #d0d9e8);
        }
        
        body.light .feature-card,
        body.light .api-section,
        body.light .changelog-section,
        body.light .deploy-section,
        body.light .stat-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            color: #1a1a2e;
        }
        
        body.light .feature-card p,
        body.light .api-desc {
            color: rgba(0,0,0,0.6);
        }
        
        /* 新增：复制代码提示 */
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--cyan);
        }
        
        .copy-btn:hover {
            background: rgba(6, 182, 212, 0.4);
        }
        
        .code-block {
            position: relative;
        }
        
        /* 新增：演示卡片 */
        .demo-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 40px;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }
        
        .demo-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            margin-top: 16px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        /* 新增：工具提示 */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }
        
        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: rgba(0,0,0,0.8);
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            display: none;
            z-index: 100;
        }
        
        [data-tooltip]:hover:before {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 - 添加主题切换 -->
        <nav class="navbar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-network"></i>
                </div>
                <div>
                    <h1>NetSight Pro</h1>
                    <p>极光诊断 · 实时网络分析</p>
                </div>
            </div>
            <div class="nav-links">
                <a href="#features">功能特性</a>
                <a href="#api">API 端点</a>
                <a href="#changelog">更新日志</a>
                <a href="#deploy">部署指南</a>
                <button class="theme-toggle" id="themeToggle" data-tooltip="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="#" class="btn-glow" id="launchBtn">
                    <i class="fas fa-rocket"></i> 启动工具
                </a>
            </div>
        </nav>

        <!-- 英雄区域保持不变 ... -->

        <!-- 新增：在线演示预览 -->
        <div class="demo-card" id="demo">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <div>
                    <h3><i class="fas fa-chart-line"></i> 实时连接演示</h3>
                    <p style="color: rgba(255,255,255,0.5); font-size: 13px;">模拟RTT监控效果</p>
                </div>
                <button class="btn-outline" id="startDemo" style="padding: 6px 20px;">
                    <i class="fas fa-play"></i> 开始演示
                </button>
            </div>
            <div class="demo-status">
                <div class="status-dot"></div>
                <span>当前RTT: <strong id="demoRtt">--</strong> ms</span>
                <span>抖动: <strong id="demoJitter">--</strong> ms</span>
                <span id="demoQuality" data-tooltip="连接质量评估">质量: 检测中</span>
            </div>
            <div id="demoChart" style="height: 60px; margin-top: 16px;"></div>
        </div>

        <!-- 其余内容保持不变 ... -->
    </div>

    <script>
        // 原有的平滑滚动代码保持不变 ...
        
        // === 新增：主题切换 ===
        const themeToggle = document.getElementById('themeToggle');
        let isLight = false;
        
        themeToggle.addEventListener('click', () => {
            isLight = !isLight;
            if (isLight) {
                document.body.classList.add('light');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', 'dark');
            }
        });
        
        // 读取保存的主题
        if (localStorage.getItem('theme') === 'light') {
            themeToggle.click();
        }
        
        // === 新增：复制代码功能 ===
        function addCopyButtons() {
            document.querySelectorAll('.code-block').forEach(block => {
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
                btn.onclick = () => {
                    const code = block.querySelector('pre').innerText;
                    navigator.clipboard.writeText(code);
                    btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
                    }, 2000);
                };
                block.style.position = 'relative';
                block.appendChild(btn);
            });
        }
        
        // === 新增：演示功能 ===
        let demoInterval = null;
        let rttHistory = [];
        
        function generateRandomRtt() {
            return Math.floor(Math.random() * 80) + 20; // 20-100ms
        }
        
        function getQualityClass(rtt) {
            if (rtt < 30) return { text: '优秀', color: '#10b981' };
            if (rtt < 50) return { text: '良好', color: '#06b6d4' };
            if (rtt < 80) return { text: '一般', color: '#f59e0b' };
            return { text: '较差', color: '#ef4444' };
        }
        
        function startDemo() {
            if (demoInterval) {
                clearInterval(demoInterval);
                demoInterval = null;
                document.getElementById('startDemo').innerHTML = '<i class="fas fa-play"></i> 开始演示';
                return;
            }
            
            document.getElementById('startDemo').innerHTML = '<i class="fas fa-stop"></i> 停止演示';
            rttHistory = [];
            
            demoInterval = setInterval(() => {
                const rtt = generateRandomRtt();
                rttHistory.push(rtt);
                if (rttHistory.length > 20) rttHistory.shift();
                
                // 计算抖动（最近5个RTT的标准差）
                let jitter = 0;
                if (rttHistory.length >= 5) {
                    const last5 = rttHistory.slice(-5);
                    const avg = last5.reduce((a,b) => a+b,0)/5;
                    jitter = Math.sqrt(last5.reduce((a,b) => a + Math.pow(b-avg,2),0)/5);
                }
                
                const quality = getQualityClass(rtt);
                
                document.getElementById('demoRtt').innerText = rtt;
                document.getElementById('demoJitter').innerText = jitter.toFixed(1);
                document.getElementById('demoQuality').innerHTML = `质量: <span style="color: ${quality.color}">${quality.text}</span>`;
                
                // 简单图表（ASCII风格）
                const bars = rttHistory.slice(-15).map(v => {
                    const height = Math.min(40, Math.floor(v / 2.5));
                    return `<div style="display:inline-block; width:12px; margin:0 2px; background:${quality.color}; height:${height}px; border-radius:4px;"></div>`;
                }).join('');
                document.getElementById('demoChart').innerHTML = `<div style="display:flex; align-items:flex-end; height:50px;">${bars}</div>`;
            }, 2000);
        }
        
        document.getElementById('startDemo').addEventListener('click', startDemo);
        
        // === 新增：获取真实Worker状态（可选）===
        async function checkWorkerStatus() {
            const WORKER_URL = 'https://netsight-pro.your-subdomain.workers.dev';
            if (WORKER_URL !== 'https://netsight-pro.your-subdomain.workers.dev') {
                try {
                    const response = await fetch(WORKER_URL, { method: 'HEAD', mode: 'no-cors' });
                    console.log('Worker is accessible');
                } catch (e) {
                    console.log('Worker not accessible yet');
                }
            }
        }
        
        // 初始化
        addCopyButtons();
        checkWorkerStatus();
        
        // 原有的启动按钮逻辑保持不变，但添加配置提示
        const WORKER_URL = 'https://netsight-pro.your-subdomain.workers.dev';
        
        function launchTool() {
            if (WORKER_URL === 'https://netsight-pro.your-subdomain.workers.dev') {
                // 使用更友好的弹窗
                const modal = document.createElement('div');
                modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;';
                modal.innerHTML = `
                    <div style="background:rgba(15,25,45,0.95);backdrop-filter:blur(20px);border-radius:32px;padding:32px;max-width:400px;text-align:center;border:1px solid rgba(6,182,212,0.3);">
                        <i class="fas fa-cloud-upload-alt" style="font-size:48px;color:var(--cyan);margin-bottom:20px;"></i>
                        <h3>需要先部署 Worker</h3>
                        <p style="color:rgba(255,255,255,0.6);margin:16px 0;">请先按照部署指南将 NetSight Pro 部署到 Cloudflare Workers，然后替换 WORKER_URL 变量。</p>
                        <button class="btn-glow" onclick="this.closest('div').remove();document.querySelector('#deploy').scrollIntoView({behavior:'smooth'});" style="margin-top:16px;">查看部署指南</button>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
            } else {
                window.open(WORKER_URL, '_blank');
            }
        }
    </script>
</body>
</html>
